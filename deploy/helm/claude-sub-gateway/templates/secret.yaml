{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-sub-gateway.fullname" . }}
  labels:
    {{- include "claude-sub-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.existingSecretKey }}: {{ required "Set `gatewayApiKeys` (or `existingSecret`) — the gateway rejects all requests without a key." .Values.gatewayApiKeys | quote }}
{{- end }}
