name: Package and push Helm chart

# Lints + renders the chart on every change (catches template breakage), and on a
# version tag (vX.Y.Z) packages it and pushes it to GHCR as an OCI artifact:
#   oci://ghcr.io/<owner>/charts/claude-sub-gateway
# Auth uses the built-in GITHUB_TOKEN — no extra secrets.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-publish.yml"
  pull_request:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-publish.yml"
  workflow_dispatch:

env:
  CHART_DIR: deploy/helm/claude-sub-gateway
  REGISTRY: ghcr.io

jobs:
  chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint
        run: helm lint "${CHART_DIR}" --set gatewayApiKeys=sk-gw-ci-test

      - name: Render (sanity check)
        run: helm template release "${CHART_DIR}" --set gatewayApiKeys=sk-gw-ci-test > /dev/null

      - name: Package & push to GHCR (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin
          helm package "${CHART_DIR}" --version "${VERSION}" --app-version "${VERSION}" --destination dist
          helm push "dist/claude-sub-gateway-${VERSION}.tgz" "oci://${REGISTRY}/${OWNER}/charts"
          echo "Pushed oci://${REGISTRY}/${OWNER}/charts/claude-sub-gateway:${VERSION}"
